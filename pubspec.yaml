name: coloring
description: "An app for children for coloring and share her dessin"
publish_to: 'none'

version: 0.0.3+3

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  path_provider: ^2.1.3
  share_plus: ^12.0.2
  screenshot: ^3.0.0
  image_gallery_saver_plus: ^4.0.1
  permission_handler: ^12.0.1
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/designs/animals/
    - assets/designs/vehicles/
    - assets/designs/space/
    - assets/designs/shapes/
    - assets/designs/english_alphabet/
    - assets/designs/arabic_alphabet/
    - assets/designs/numbers/
