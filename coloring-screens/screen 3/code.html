<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#888248",
                    "surface-variant": "#f4eb90",
                    "on-surface-variant": "#6b662e",
                    "on-primary-fixed": "#433700",
                    "tertiary-container": "#ff8fa9",
                    "outline-variant": "#c2bb7b",
                    "surface-container-high": "#f9f19b",
                    "surface-bright": "#fffbff",
                    "on-background": "#3d3905",
                    "on-secondary": "#ffffff",
                    "primary-fixed-dim": "#edc600",
                    "on-surface": "#3d3905",
                    "surface-container-highest": "#f4eb90",
                    "primary-container": "#fdd400",
                    "error-dim": "#b92902",
                    "tertiary": "#c60159",
                    "on-tertiary-fixed": "#380014",
                    "surface": "#fffbff",
                    "secondary": "#006c90",
                    "tertiary-fixed-dim": "#ff769b",
                    "surface-dim": "#efe586",
                    "on-secondary-fixed": "#00394e",
                    "inverse-primary": "#fdd400",
                    "error-container": "#f95630",
                    "inverse-on-surface": "#a59f61",
                    "surface-container-low": "#fffae2",
                    "tertiary-dim": "#b0004e",
                    "surface-container-lowest": "#ffffff",
                    "error": "#be2d06",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#97daff",
                    "surface-tint": "#776300",
                    "on-secondary-container": "#004d68",
                    "on-error-container": "#520c00",
                    "on-tertiary-container": "#66002b",
                    "secondary-dim": "#005f80",
                    "primary": "#776300",
                    "on-error": "#ffffff",
                    "inverse-surface": "#100f00",
                    "primary-fixed": "#fdd400",
                    "on-primary-container": "#594a00",
                    "surface-container": "#fff6a5",
                    "on-secondary-fixed-variant": "#005775",
                    "on-tertiary-fixed-variant": "#770033",
                    "on-primary-fixed-variant": "#645300",
                    "tertiary-fixed": "#ff8fa9",
                    "on-tertiary": "#ffffff",
                    "background": "#fffbff",
                    "primary-dim": "#695700",
                    "secondary-container": "#97daff",
                    "secondary-fixed-dim": "#6ccfff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .canvas-bg {
            background-image: radial-gradient(circle at 2px 2px, #f1f1f1 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low min-h-screen text-on-surface">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-b-[3rem] px-6 py-4 shadow-[0_24px_40px_-12px_rgba(255,214,0,0.06)]">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center active:scale-95 duration-200 hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-on-secondary-container">arrow_back</span>
</div>
<h1 class="font-plus-jakarta-sans font-bold tracking-tight text-2xl text-yellow-500 italic">Tactile Playground</h1>
</div>
<button class="bg-tertiary text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg active:scale-90 transition-all duration-300 flex items-center gap-2">
<span>تم</span>
<span class="material-symbols-outlined">check_circle</span>
</button>
</header>
<!-- Main Drawing Canvas Area -->
<main class="flex flex-col items-center px-4 pt-6 pb-32 max-w-5xl mx-auto">
<!-- The Canvas Shell -->
<div class="relative w-full aspect-[4/3] md:aspect-video bg-surface-container-lowest rounded-xl shadow-[0_32px_64px_-16px_rgba(0,0,0,0.05)] flex items-center justify-center p-8 canvas-bg group overflow-hidden">
<!-- Animal Outline -->
<img alt="friendly lion outline" class="max-w-full max-h-full object-contain mix-blend-multiply opacity-80" data-alt="Simple high-contrast black and white vector outline of a friendly smiling lion for a children's coloring book application" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBm02ITpez28Dvn-g7WR68x-6gzjDyePg3zUqAhBUZFCsmOvmb4VdLnKHtLTYWL08fiiK4sIPBioKRMKD7WZja5UIRmvAiTWI5ADbXmGIzwtN6e2kh1YzftNZ9qHdrBYP3xBpEnKWVLX3kouwd2pQ-bXQK6NV8xArdkHGn4JMTjpXfqnQGBqDhb4dUGFcvJuSjdEhYmJ--Kq-E3AHKcBfpQKd166wzwlRhyyqsG6DC4q9kzyqXr_ZZK1KPk2dtJ42nIg_CvknlX6Yu_"/>
<!-- Floating Side Toolbar (Left) -->
<div class="absolute left-6 top-1/2 -translate-y-1/2 flex flex-col gap-4 bg-white/60 backdrop-blur-md p-3 rounded-full shadow-xl">
<button class="w-14 h-14 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center hover:scale-110 active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">brush</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center hover:scale-110 active:scale-90 transition-transform">
<span class="material-symbols-outlined">format_paint</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center hover:scale-110 active:scale-90 transition-transform">
<span class="material-symbols-outlined">ink_eraser</span>
</button>
</div>
<!-- Floating Side Toolbar (Right) -->
<div class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col gap-4 bg-white/60 backdrop-blur-md p-3 rounded-full shadow-xl">
<button class="w-14 h-14 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center hover:scale-110 active:scale-90 transition-transform">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center hover:scale-110 active:scale-90 transition-transform">
<span class="material-symbols-outlined">zoom_in</span>
</button>
</div>
</div>
<!-- Color Palette (Asymmetric Staggered Layout) -->
<div class="w-full mt-12 mb-8">
<h2 class="text-center font-bold text-xl mb-6 text-on-surface-variant flex items-center justify-center gap-2">
<span>اختر لوناً</span>
<span class="material-symbols-outlined text-primary">palette</span>
</h2>
<div class="flex flex-wrap justify-center gap-4 px-4">
<!-- Staggered "Crayons" -->
<button class="w-12 h-32 rounded-full bg-red-500 border-4 border-white shadow-lg -rotate-6 hover:scale-110 transition-transform active:translate-y-2"></button>
<button class="w-12 h-36 rounded-full bg-orange-400 border-4 border-white shadow-lg rotate-3 hover:scale-110 transition-transform active:translate-y-2"></button>
<button class="w-12 h-32 rounded-full bg-yellow-400 border-4 border-white shadow-lg -rotate-3 hover:scale-110 transition-transform active:translate-y-2 ring-4 ring-primary ring-offset-4 scale-105"></button>
<button class="w-12 h-36 rounded-full bg-green-400 border-4 border-white shadow-lg rotate-6 hover:scale-110 transition-transform active:translate-y-2"></button>
<button class="w-12 h-32 rounded-full bg-blue-400 border-4 border-white shadow-lg -rotate-12 hover:scale-110 transition-transform active:translate-y-2"></button>
<button class="w-12 h-36 rounded-full bg-indigo-500 border-4 border-white shadow-lg rotate-2 hover:scale-110 transition-transform active:translate-y-2"></button>
<button class="w-12 h-32 rounded-full bg-purple-500 border-4 border-white shadow-lg -rotate-6 hover:scale-110 transition-transform active:translate-y-2"></button>
<button class="w-12 h-36 rounded-full bg-pink-400 border-4 border-white shadow-lg rotate-12 hover:scale-110 transition-transform active:translate-y-2"></button>
<button class="w-12 h-32 rounded-full bg-tertiary-container border-4 border-white shadow-lg -rotate-3 hover:scale-110 transition-transform active:translate-y-2"></button>
<button class="w-12 h-36 rounded-full bg-stone-800 border-4 border-white shadow-lg rotate-6 hover:scale-110 transition-transform active:translate-y-2"></button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 h-24 bg-slate-100/90 dark:bg-slate-800/90 backdrop-blur-lg rounded-t-[3rem] shadow-[0_-10px_30px_rgba(0,0,0,0.04)]">
<!-- Play Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-yellow-400 text-white rounded-full px-6 py-2 scale-110 shadow-lg active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home_app_logo</span>
<span class="font-plus-jakarta-sans text-xs font-bold uppercase tracking-wider">Play</span>
</a>
<!-- Gallery Tab -->
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:bg-yellow-100 dark:hover:bg-yellow-900/30 rounded-full transition-colors active:scale-90" href="#">
<span class="material-symbols-outlined">photo_library</span>
<span class="font-plus-jakarta-sans text-xs font-bold uppercase tracking-wider">Gallery</span>
</a>
</nav>
</body></html>
