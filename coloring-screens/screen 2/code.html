<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                  "body": ["Plus Jakarta Sans"],
                  "label": ["Plus Jakarta Sans"]

        },
      },
    }

<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .confetti-bg {
      background-image: radial-gradient(circle, #fdd400 20%, transparent 20%), radial-gradient(circle, #ff8fa9 20%, transparent 20%);
      background-size: 50px 50px;
      background-position: 0 0, 25px 25px;
      opacity: 0.1;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low min-h-screen flex flex-col text-on-surface selection:bg-primary-container">
<!-- TopAppBar Shell -->
<header class="flex justify-between items-center w-full sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-b-[3rem] px-6 py-4 shadow-[0_24px_40px_-12px_rgba(255,214,0,0.06)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-yellow-400 dark:text-yellow-300" data-icon="star">star</span>
<h1 class="font-plus-jakarta-sans font-bold tracking-tight text-2xl font-black text-yellow-500 dark:text-yellow-400 italic">Tactile Playground</h1>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center hover:scale-110 transition-transform active:scale-95 duration-200 cursor-pointer">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
</div>
</header>
<!-- Main Achievement Canvas -->
<main class="flex-grow flex flex-col items-center justify-center relative px-6 py-12 overflow-hidden">
<!-- Confetti Background Overlay -->
<div class="absolute inset-0 confetti-bg pointer-events-none"></div>
<!-- Celebration Content -->
<div class="relative z-10 w-full max-w-2xl flex flex-col items-center">
<!-- Victory Badge -->
<div class="mb-8 flex flex-col items-center">
<div class="bg-primary-container p-4 rounded-full shadow-lg mb-4 animate-bounce">
<span class="material-symbols-outlined text-on-primary-container text-5xl" data-icon="celebration" style="font-variation-settings: 'FILL' 1;">celebration</span>
</div>
<h2 class="text-3xl font-black text-primary text-center">عمل رائع!</h2>
<p class="text-on-surface-variant font-bold mt-2">لقد أبدعت في تلوين هذه الرسمة</p>
</div>
<!-- Artwork Preview Card -->
<div class="w-full aspect-[4/3] bg-surface-container-lowest rounded-xl shadow-[0_24px_60px_-15px_rgba(0,0,0,0.1)] p-4 relative transform rotate-1 hover:rotate-0 transition-transform duration-500 group">
<div class="w-full h-full overflow-hidden rounded-lg bg-white border-[12px] border-white shadow-inner relative">
<img class="w-full h-full object-cover rounded-sm" data-alt="a vibrant digital children's coloring of a happy lion in a jungle with bright sun, colorful flowers and rainbow sky in a soft painterly style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAm3AdUyVKeiYWN10ivNZkdQHY91qUU_8UuBCHwFipQdot7o7frkRZC3iT4GCGFdmFvL6am9bm7eFnQj_ndLHzx4EVRjXR2A-Bm1IeGKFdDf16KSr5LmpHgR29yEv0IxtgmifAFATszZuBoiXYsLMIDfqAdOsDX6qBSJaNwOy-Rcl6sEQn54oacqKZ0Df_kboLTi-YVWr9HSRT6VJ4lZj-m4FrRYH-LmgpEoIgQfgZ8322Yz9K73dTT7lFlw0qdO8VfiCSI-mKPjN5C"/>
<!-- Sparkle decorations -->
<span class="material-symbols-outlined absolute top-4 left-4 text-yellow-400 text-3xl animate-pulse" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="material-symbols-outlined absolute bottom-4 right-4 text-pink-400 text-3xl animate-pulse delay-75" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<!-- Action Buttons Grid -->
<div class="mt-12 grid grid-cols-2 gap-6 w-full max-w-md">
<!-- Save Button -->
<button class="bg-primary-container text-on-primary-container rounded-xl h-24 flex flex-col items-center justify-center gap-1 shadow-lg hover:scale-105 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-3xl" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-bold text-lg">حفظ</span>
</button>
<!-- Share Button -->
<button class="bg-secondary-container text-on-secondary-container rounded-xl h-24 flex flex-col items-center justify-center gap-1 shadow-lg hover:scale-105 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-3xl" data-icon="share" style="font-variation-settings: 'FILL' 1;">share</span>
<span class="font-bold text-lg">مشاركة</span>
</button>
<!-- New Drawing Button (Full Width) -->
<button class="col-span-2 bg-tertiary-container text-on-tertiary-container rounded-xl h-20 flex items-center justify-center gap-4 shadow-lg hover:scale-105 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-3xl" data-icon="brush" style="font-variation-settings: 'FILL' 1;">brush</span>
<span class="font-black text-xl">رسمة جديدة</span>
</button>
</div>
</div>
</main>
<!-- Navigation Spacing for Fixed Bottom Bar -->
<div class="h-32"></div>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 h-24 bg-slate-100/90 dark:bg-slate-800/90 backdrop-blur-lg rounded-t-[3rem] pb-safe shadow-[0_-10px_30px_rgba(0,0,0,0.04)]">
<!-- Play (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-500 p-2 hover:bg-yellow-100 dark:hover:bg-yellow-900/30 transition-all active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="home_app_logo">home_app_logo</span>
<span class="font-plus-jakarta-sans text-xs font-bold">Play</span>
</a>
<!-- Gallery (Active - Logic: Share/Complete is part of the Gallery ecosystem) -->
<a class="flex flex-col items-center justify-center bg-yellow-400 text-white rounded-full px-6 py-2 scale-110 shadow-lg active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="photo_library" style="font-variation-settings: 'FILL' 1;">photo_library</span>
<span class="font-plus-jakarta-sans text-xs font-bold">Gallery</span>
</a>
</nav>
</body></html>
